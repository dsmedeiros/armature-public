name: Governance Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-governance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Run Armature governance validation
        run: bash .armature/hooks/post-stop.sh
