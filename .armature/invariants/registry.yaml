    exceptions: []

  HOOK-002:
    name: "Agent self-governance prevention"
    severity: critical
    description: "Agents must not modify their own governance configuration to prevent self-modification undermining enforcement."
    rule: "The block-config-changes.sh hook must block agent-initiated configuration changes on ConfigChange events."
    status: active
    superseded-by: null
    defined-in: docs/adr/0001-governance-as-files.md
    enforced-by:
