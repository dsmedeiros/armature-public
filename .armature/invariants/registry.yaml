    severity: high
    description: "Session state must be mechanically re-injected after context compaction to prevent governance amnesia."
    rule: "The reinject-context.sh hook must restore session state on SessionStart(compact) events."
    status: active
    superseded-by: null
    defined-in: docs/adr/0001-governance-as-files.md
