  HOOK-001:
    name: "Destructive command prevention"
    severity: high
    description: "Destructive shell commands (rm -rf, force push, hard reset, DROP TABLE, --no-verify) must be blocked to prevent irreversible damage."
    rule: "The block-dangerous-commands.sh hook must block destructive shell commands on PreToolUse(Bash) events."
    status: active
    superseded-by: null
