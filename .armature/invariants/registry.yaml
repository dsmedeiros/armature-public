  HOOK-004:
    name: "Subagent governance context injection"
    severity: high
    description: "Subagents must receive governance context (active invariants, session state, scope directives) at spawn time."
    rule: "The inject-context.sh hook must inject governance context into subagent system prompts on SubagentStart events."
    status: active
    superseded-by: null
    defined-in: docs/adr/0001-governance-as-files.md
